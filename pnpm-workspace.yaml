# AI Coding
# @file pnpm-workspace.yaml
# @description Cấu hình pnpm workspace và hỗ trợ các hệ điều hành cài đặt.
packages:
  - '.'
supportedArchitectures:
  os:
    - linux
    - darwin
  cpu:
    - x64
    - arm64
  libc:
    - glibc
# Refuse packages published < 7 days ago, matching the root pnpm-workspace.yaml.
minimumReleaseAge: 10080
